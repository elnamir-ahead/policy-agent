<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy Knowledge Agent — Procurement + Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Outfit', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: linear-gradient(180deg, #0a0f1a 0%, #0f172a 50%, #0a0f1a 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      border-bottom: 1px solid rgba(51, 65, 85, 0.6);
      padding: 1.25rem 1.5rem;
      backdrop-filter: blur(8px);
      background: rgba(10, 15, 26, 0.8);
    }
    .header-inner {
      max-width: 48rem;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.75rem;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.125rem;
      color: #0a0f1a;
      box-shadow: 0 4px 14px rgba(245, 158, 11, 0.2);
    }
    .header-text h1 { font-size: 1.25rem; font-weight: 600; color: #cbd5e1; margin: 0; letter-spacing: -0.02em; }
    .header-text .tagline {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.125rem 0.5rem;
      border-radius: 0.375rem;
      background: #151c2c;
      border: 1px solid rgba(51, 65, 85, 0.5);
      color: #cbd5e1;
      font-size: 0.6875rem;
      font-weight: 500;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; animation: pulse 2s infinite; }
    .tagline-sep { color: #475569; }
    .tagline-search { color: #06b6d4; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    main { flex: 1; overflow-y: auto; padding: 2rem 1.5rem; max-width: 48rem; margin: 0 auto; width: 100%; }
    .empty-hero { text-align: center; margin-bottom: 2rem; }
    .empty-hero p { font-size: 1.125rem; color: #94a3b8; margin: 0 0 0.75rem; }
    .empty-hero p strong { color: #f59e0b; font-weight: 500; }
    .empty-hero .sub { font-size: 0.875rem; color: #64748b; max-width: 28rem; margin: 0 auto; }
    .suggestions-label { font-size: 0.6875rem; font-weight: 500; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .suggestion {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.875rem 1rem;
      margin-bottom: 0.5rem;
      border-radius: 0.75rem;
      background: rgba(21, 28, 44, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.4);
      color: #cbd5e1;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .suggestion:hover {
      border-color: rgba(245, 158, 11, 0.4);
      background: #151c2c;
      color: #f1f5f9;
    }
    .suggestion:hover span { color: #f59e0b; }
    .message { display: flex; margin-bottom: 1.5rem; }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .bubble {
      max-width: 85%;
      padding: 0.875rem 1rem;
      border-radius: 1rem;
      font-size: 0.875rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .message.user .bubble {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #0a0f1a;
      font-weight: 500;
      box-shadow: 0 4px 14px rgba(245, 158, 11, 0.2);
    }
    .message.assistant .bubble {
      background: rgba(21, 28, 44, 0.8);
      border: 1px solid rgba(51, 65, 85, 0.4);
      color: #e2e8f0;
      backdrop-filter: blur(4px);
    }
    .loading { display: flex; gap: 0.375rem; padding: 0.5rem; }
    .loading span {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: #f59e0b;
      animation: bounce 0.6s ease-in-out infinite;
    }
    .loading span:nth-child(2) { animation-delay: 0.15s; }
    .loading span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    footer {
      border-top: 1px solid rgba(51, 65, 85, 0.6);
      padding: 1rem 1.5rem;
      backdrop-filter: blur(8px);
      background: rgba(10, 15, 26, 0.6);
    }
    form { display: flex; gap: 0.75rem; max-width: 48rem; margin: 0 auto; }
    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      background: rgba(21, 28, 44, 0.8);
      border: 1px solid rgba(51, 65, 85, 0.4);
      color: #f1f5f9;
      font-size: 1rem;
      font-family: inherit;
    }
    input::placeholder { color: #64748b; }
    input:focus {
      outline: none;
      border-color: rgba(245, 158, 11, 0.6);
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
    }
    button {
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #0a0f1a;
      font-weight: 600;
      font-size: 0.9375rem;
      border: none;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 14px rgba(245, 158, 11, 0.2);
      transition: opacity 0.2s;
    }
    button:hover:not(:disabled) { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">P</div>
      <div class="header-text">
        <h1>Policy Knowledge Agent</h1>
        <p class="tagline">
          <span class="badge"><span class="badge-dot"></span> Policy knowledge base</span>
          <span class="tagline-sep">•</span>
          <span>Answers with citations</span>
          <span class="tagline-sep">•</span>
          <span class="tagline-search">Web search when needed</span>
        </p>
      </div>
    </div>
  </header>

  <main>
    <div id="messages"></div>
    <div id="loading" style="display:none;">
      <div class="message assistant">
        <div class="bubble"><div class="loading"><span></span><span></span><span></span></div></div>
      </div>
    </div>
    <div id="end"></div>
  </main>

  <footer>
    <form id="form">
      <input type="text" id="input" placeholder="Ask anything — policy, process, or general..." autocomplete="off" />
      <button type="submit" id="submit">Send</button>
    </form>
  </footer>

  <script>
    const API_URL = '';
    const suggested = [
      'I need to buy a SaaS tool for my team — $18k/year. What do I do?',
      'We want to use a new vendor. What paperwork is required?',
      'Give me the SOW template and draft an email to procurement with the required intake details.',
      'What is the date today?'
    ];

    const messagesEl = document.getElementById('messages');
    const loadingEl = document.getElementById('loading');
    const inputEl = document.getElementById('input');
    const submitEl = document.getElementById('submit');
    const formEl = document.getElementById('form');

    let chatHistory = [];
    let sessionId = crypto.randomUUID();

    function render() {
      if (chatHistory.length === 0) {
        messagesEl.innerHTML = `
          <div class="empty-hero">
            <p>Ask <strong>anything</strong> — policy, process, or general questions.</p>
            <p class="sub">Grounded in your procurement policies. Searches the web when the knowledge base doesn't have the answer.</p>
          </div>
          <div class="suggestions-label">Try these</div>
          ${suggested.map(q => `<button class="suggestion" data-q="${q.replace(/"/g, '&quot;')}"><span>${q}</span></button>`).join('')}
        `;
        messagesEl.querySelectorAll('.suggestion').forEach(btn => {
          btn.onclick = () => { inputEl.value = btn.dataset.q; inputEl.focus(); };
        });
      } else {
        messagesEl.innerHTML = chatHistory.map(m => `
          <div class="message ${m.role}">
            <div class="bubble">${m.content.replace(/</g, '&lt;').replace(/\n/g, '<br>')}</div>
          </div>
        `).join('');
      }
      document.getElementById('end').scrollIntoView({ behavior: 'smooth' });
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      chatHistory.push({ role: 'user', content: text });
      render();
      loadingEl.style.display = 'block';
      submitEl.disabled = true;

      const messages = chatHistory.map(m => ({ role: m.role, content: m.content }));

      try {
        const res = await fetch((API_URL || '') + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages, session_id: sessionId })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || data.error || `HTTP ${res.status}`);

        chatHistory.push({ role: 'assistant', content: data.response });
      } catch (err) {
        chatHistory.push({
          role: 'assistant',
          content: 'Error: ' + err.message + '. Make sure the backend is running: uvicorn app:app --port 8000'
        });
      }

      loadingEl.style.display = 'none';
      submitEl.disabled = false;
      render();
    }

    formEl.onsubmit = (e) => { e.preventDefault(); send(); };
    render();
  </script>
</body>
</html>
